name: Headless Export

on:
  workflow_dispatch:

jobs:
  export:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            ffmpeg \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Run headless export pipeline
        run: cargo run --manifest-path src-tauri/Cargo.toml --bin headless_pipeline -- .github/headless-export.json

      - name: Upload exported mp4
        uses: actions/upload-artifact@v4
        with:
          name: exported-mp4
          path: .github-artifacts/export.mp4
          if-no-files-found: error

      - name: Upload generated project data
        uses: actions/upload-artifact@v4
        with:
          name: generated-project
          path: .github-artifacts/project
          if-no-files-found: error
